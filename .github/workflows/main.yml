name: Deploy to OVH

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive   # only if your theme is a git submodule

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true          # needed if your theme uses SCSS

      - name: Build
        run: hugo --gc --minify

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy
        run: |
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate true;
            open -u '${{ secrets.DEPLOY_FTP_USER }}','${{ secrets.DEPLOY_FTP_PASSWORD }}' ${{ secrets.DEPLOY_FTP_HOST }};
            mirror --reverse --delete --verbose \
              --exclude-glob .git/ \
              public/ ${{ secrets.DEPLOY_FTP_PATH }};
          "
