<html> 
  <head> 
    <title>Embedded Object Characters Test</title> 
  </head> 
  <body> 
    <p> 
      Here's our logo: <img src="http://live.gnome.org/Accessibility?action=AttachFile&do=get&target=logo.png" alt="GNOME a11y team logo" /> It reminds me of airport security screenings.
    </p> 
    <p> Choose: <input value="apples" type="checkbox">apples</input> <input value="oranges" type="checkbox">oranges</input> (pick one or more)</p> 
    <p> 
      Choose:
      <input name="rchoice" value="apples" type="radio">apples</input> 
      <input name="rchoice" value="oranges" type="radio">oranges</input> 
      (just pick one)
    </p> 
    <p> 
      Choose:
      <select name="fruit"> 
        <option>apples</option> 
        <option>oranges</option> 
      </select> 
      (just pick one)
    </p> 
    <p>
      <input name="button" value="push me" type="button"/> 
    </p>
  </body> 
</html>
