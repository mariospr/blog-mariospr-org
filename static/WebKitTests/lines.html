<html>
<head>
<style>
#silly-list {
	list-style: none;
	width: 100%;
}

#silly-list li {
	float: left;
	padding: 10px;
}
</style>
<title>Line Navigation Test</title>
</head>
<body>
<p>Here is a simple table:</p>
<table width="100%">
<caption>Table Caption</caption>
<tr><th></th><th>Col. Header 1</th><th>Col. Header 2</th></tr>
<tr><th>Row Header 1</th><td>One</td><td>Two</td></tr>
<tr><th>Row Header 2</th><td>Three</td><td>Four</td></tr>
</table>
<p>Here is more text, followed by a list with all of the elements on a single line:</p>
<div>
<p>
<ul id="silly-list">
<li>One</li>
<li>Two</li>
<li>Three</li>
<li>Four</li>
</ul>
</p>
<br clear="all"/>
<p>And a final line of text</p>
</body>
</html>
