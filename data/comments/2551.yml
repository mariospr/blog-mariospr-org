- id: 37232
  author: Joaquim Rocha
  url: https://www.joaquimrocha.com
  date: '2018-08-06T08:37:49+00:00'
  date_display: August 6, 2018
  html: "<p>Thanks for your help while at Endless, Mario! I am happy you're going back home and doing what makes you happy.\r<br>\nBest wishes for all the logistics, but I know everything will be alright. Cheers!</p>"
  children:
  - id: 37233
    author: mario
    url: ''
    date: '2018-08-06T10:06:31+00:00'
    date_display: August 6, 2018
    html: <p>Thank you. I'm hoping logistics will be alright too... so far it's been a pretty busy couple of weeks non-stop packing and dealing with paperwork and other tenancy-related things, but we're starting to see the light at the end of the tunnel now and couldn't be happier about flying tomorrow, as everything seems to be on track for a smooth landing. Fingers crossed!</p>
    children: []
