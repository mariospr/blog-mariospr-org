  url: https://mariospr.org
  date: '2011-08-13T17:45:16+00:00'
  date_display: August 13, 2011
  html: '<p>@Rahul: thanks a lot for your interest on packaging frogr for Fedora. I''m also a Fedora user and would also love as well to see it packaged soon.</p>

    <p>Actually, the work to package it has been already started, so if you want to help with that feel free to visit RH bug 708765 (https://bugzilla.redhat.com/show_bug.cgi?id=708765), which is were this is being tracked down at the moment.</p>

    <p>Thanks!</p>

    <p>PS: See the last comment (https://bugzilla.redhat.com/show_bug.cgi?id=708765#c61) where all the data needed, I hope, like the .spec file are referenced by links</p>'
  children: []
- id: 189
