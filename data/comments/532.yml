- id: 185
  author: noname
  url: ''
  date: '2011-08-13T14:55:11+00:00'
  date_display: August 13, 2011
  html: <p>I always find it kind of emarrasing when some free software site, like frogrs, claim it's licensed under "GNU Public License". It proves that people didn't even read the headline of the license they used for their software when they can't even get the name right (and on a legal matter I wonder if this means the licensing terms are unknown, since there's no GNU Public License).</p>
  children: []
- id: 186
  author: mario
  url: https://mariospr.org
  date: '2011-08-13T15:58:54+00:00'
  date_display: August 13, 2011
  html: '<p>@noname: It was a typo and now it''s fixed, so thank you for pointing it out. Worse of all, it looks like I also screw it up in the announcement mails to the gnome.org mailing lists (damm c&amp;p!), so I will try not to commit the same mistake again in the future.</p>

    <p>Still, I don''t think the "way" you pointed it out was a good one, honestly, it sounds more like an attack than like "willing to help".</p>

    <p>It was a typo, period, and now it''s fixed. If you took your time to check all the places in frogr''s git repository where the GPL is mentioned, there is NOT a single place where the license is badly named (and if there was, it wouldn''t be the end of the world either), which proves that it was a typo, a "human" mistake, like all those we all (and I bet that you too) make every now and then.</p>

    <p>So don''t worry, the license terms of frogr are not unknown, as they are clearly stated along with a big COPYING file in the tarball. And that''s what matters at the end, not the text line that you paste in a mail or in a wiki, which is more error-prone IMHO.</p>

    <p>So, again thank you for pointing it out (I''m the first one who doesn''t like this kind of mistakes at all), but next time I''d ask you for being a little bit more human and less aggressive on your comments.</p>

    <p>Thanks</p>'
  children: []
