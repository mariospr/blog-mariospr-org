  url: ''
  date: '2011-08-15T11:22:00+00:00'
  date_display: August 15, 2011
  html: '<p>Hi again!</p>

    <p>Sorry if you didn''t like what I wrote. It was not meant to be hurtful or even specifically aimed at anyone. It''s just such a common "typo" that I wonder if there are more websites that gets the name right then wrong (with that particular version of wrong, not just a random error) and the "phenomena" itself gets me a bit frustrated.... So it was no more then an outloud *sigh* from me.... I''ll try to keep it down in the future to not disturb anyone. ;)<br>

    Great to see you''ve fixed it but now there are just millions of more places left out there to fix. I wonder if it''s worth to even sigh about it. :P</p>

    <p>Have a great day!</p>'
  children: []
- id: 190
