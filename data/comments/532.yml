  url: https://mariospr.org
  date: '2011-08-15T17:20:57+00:00'
  date_display: August 15, 2011
  html: '<p>@noname: thanks for your second comment, it was indeed clarifying and as such I appreciate it, specially because (as I said) I''m the kind of person who does not like at all those kind of mistakes, even if my human and sometimes absent minded nature makes me commit them all the time...</p>

    <p>Anyway, no problem from my side, and as I said thank you for pointing it out, since now it''s fixed in the website and I have already written down a note in my particular "frogr releasing checklist" not to forget about the announcement mail next time I release a new version.</p>'
