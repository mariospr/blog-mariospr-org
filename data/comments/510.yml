- id: 180
  author: mario
  url: https://mariospr.org
  date: '2011-05-29T00:07:30+00:00'
  date_display: May 29, 2011
  html: '<p>@Christophe Fergeau:</p>

    <p>&gt; &gt; I would love to see it also in other distros (specially in Fedora)<br>

    &gt; <br>

    &gt; Any reason why you are not pushing it yourself? No time/no interest in doing it?<br>

    &gt; I was wondering this when reading frogr release notes, and then I read your blog post :)</p>

    <p>Well, guess the reason for that is that I''m not very fond on packaging related tasks (specially when it comes to know the process of proposing something to be packaged in a distro works), so that''s why I went for this "really lazy" approach of releasing the tarball, providing some "homegrown" packages for ubuntu (using LP''s PPA) and Fedora 15 (using my own machine) and then asking the world for helping me to release frogr in distros, in a more "professional" way :-)</p>

    <p>In the other hand, I must confess that the fact that my mate Berto already took care of packaging frogr for debian (whose immediate consequence is that frogr is already being packaged in the next release of Ubuntu "Oniric Oscelot") got me even more relaxed in these matters because I kind of came to the conclusion that at some point the package would "magically" appear in those other distros apart than debian and ubuntu (yes, I kind of assumed that some kind of "automatic importing process" from debian to distro X exists).</p>

    <p>So you see, because of one reason or another, I never got the right combo of motivation and free time to devote to learning more about these matters, and that''s the true reason behind me using this lazy approach.</p>

    <p>But perhaps you''re right, and I should try to find the right slot to learn more about these matters and try to push them myself.</p>

    <p>Thanks for triggering this in my mind,  although I''m afraid I can''t commit to find the right time to push this forward anytime soon, so any help that anybody could provide will be still really appreciated ;-)</p>'
  children: []
