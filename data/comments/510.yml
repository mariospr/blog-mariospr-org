  html: <p>Oh I wasn't asking for such a detailed explanation, "I'm don't like doing packaging" would have been plenty enough for me, I perfectly understand this :) Since frogr became my favourite flickr uploader, and since I'm on f15, maybe I'll look at pushing it in the coming weeks (no promises though ;)</p>
