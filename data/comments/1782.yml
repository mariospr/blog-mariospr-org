  html: <p>Small typo, "speeded" should be "sped" :)</p>
  children:
  - id: 30711
    author: mario
    url: ''
    date: '2015-01-08T13:24:49+00:00'
    date_display: January 8, 2015
    html: '<p>Thanks for the correction. I can''t correct the release announcement email now, but I can certainly fix this post, so done.</p>

      <p>Still, there seems not to be a "black or white" thing either, apparently both "sped up" and "speeded up" are correct, with the first option being perhaps more common: http://grammarist.com/usage/sped-speeded</p>

      <p>Anyway, I''m not a native English speaker (as it''s obvious) so I''d rather trust your judgement better than mine on this topic :-)</p>

      <p>Thanks!</p>'
    children: []
