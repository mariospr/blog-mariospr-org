  html: <p>thanks for the gaim info; good to know.  <a href="http://ronrothman.com/public/leftbraned/archives/2006/02/28/password-security-its-not-that-hard-but-you-still-cant-get-it-right/" rel="nofollow">storing passwords</a> in plaintext is lame, period.  shame on those lazy developers!</p>
