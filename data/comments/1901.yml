  date: '2015-04-01T20:01:45+00:00'
  date_display: April 1, 2015
  html: "<p>And I adapted myself now to use this clicky touchpad on my Thinkpad E531\r<br>\nBut I only basically use the real click for the left mouse click and then the touch events (like pressing or better touching with two fingers) for middle click and right click (3 finger touch) .\r<br>\nI still prefer the smaller but better touchpad on the t410/420 with real buttons . It simply works and feels better.</p>"
