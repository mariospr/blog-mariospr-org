- id: 125
  author: Dave Morley
  url: ''
  date: '2010-02-07T21:08:24+00:00'
  date_display: February 7, 2010
  html: '<p>There is an alternative method to install the ppa which may be of interest to new users.</p>

    <p>Goto System-&gt;Administration-&gt;Software Sources.<br>

    Click on the other software tab.<br>

    Click on add.<br>

    Type in ppa:webkit-team<br>

    Click on add source.</p>

    <p>Repeat but with ppa:webkit-team/epiphany</p>

    <p>Click on close that will reload the the repository list and include the keys.  You can use this method for any ppa''s registered on launchpad.</p>'
  children: []
