  url: http://www.forum.nokia.com/info/sw.nokia.com/id/c05693a1-265c-4c7f-a389-fc227db4c465/Maemo_5_SDK.html
  date: '2010-01-28T09:57:00+00:00'
  date_display: January 28, 2010
  html: <p>The Maemo 5 SDK has been updated to provide developers with features of sending via Bluetooth technology and email, as well as improved documentation that will be of interest to MMS developers.For developers who have already installed an earlier version of the SDK, the update can be obtained using the apt package management tool in scratchbox.The SDK includes all the tools developers need to write, test, compile, and package for distribution Maemo 5 software on a Linux based computer.The Maemo 5 SDK enables development of applications by the use of Qt and GTK+.</p>
  children: []
