  html: '<p>Cool... I didn''t even know that I was missing out on multiple cursors! The one feature that I really needed, I had to write. It''s all here in case you want to take a look: https://bugzilla.gnome.org/show_bug.cgi?id=693283</p>

    <p>Sadly I don''t have a vim version of this plugin, but if someone can hack it, I''d love to have one.</p>'
