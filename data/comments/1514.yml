- id: 6639
  author: Luis Medinas
  url: ''
  date: '2013-03-28T13:54:44+00:00'
  date_display: March 28, 2013
  html: "<p>I recently moved to ST2 after 6/7 years of emacs. And i'm very happy with this move.</p>\n<p>Here some reasons why i moved:</p>\n<p>- ST2 has a complete UI and the keyboard shortcuts are much more sane than emacs.\r<br>\n- ST2 feels beatiful, modern and polished in every platform.\r<br>\n- ST2 is fast and make you more productive since it's equally powerful and more simpler.\r<br>\n- ST2 can be extended by Python. I already made 3 plugins to boost my own work where in Emacs you have to use LISP which i guess not many people know it (including me).\r<br>\n- ST2 config files are simpler and intuitive unlike emacs.\r<br>\n- I found that i had to install more packages on emacs than in ST2. Most of the experience comes out-of-box in ST2.\r<br>\n- The plugins for ST2 can be really powerful and easy to use. See REPL or Package Control to know what i mean.\r<br>\n- ST3 features are really promissing.</p>\n<p>Drawbacks:\r<br>\n- ST is not free software.\r<br>\n- Sometimes i still have to use emacs (or nano) for the console.\r<br>\n- ST2 development is stopped now, ST3 is under development (beta).</p>\n<p>After all both are powerful, so i think it's just a better of easy vs difficult or simple vs complicated.</p>\n<p>I prefer the simple/easy way now. I feel that a made a great move.</p>"
  children: []
- id: 7157
  author: PatrickB
  url: http://www.samsunggalaxyproclaim.net
  date: '2013-04-27T07:27:25+00:00'
  date_display: April 27, 2013
  html: <p>Thanks, luis, for the very helpful comparison of emacs vs. ST2. Rackspace had a fun "contest" and emacs won that (barely beating Sublime in the head-to-head). But you make some compelling points in favor of ST2.</p>
  children: []
