- id: 6491
  author: nacho
  url: ''
  date: '2013-03-23T15:10:39+00:00'
  date_display: March 23, 2013
  html: <p>So what about trying gedit? I always like to hear what people don't like about gedit, can you make a list of things that you are missing or that you are not comfortable with?</p>
  children:
  - id: 6492
    author: mario
    url: ''
    date: '2013-03-23T15:21:35+00:00'
    date_display: March 23, 2013
    html: '<p>I already tried GEdit some times in the past and even used it as my default coding editor when I was at the University (although to be fair, that was a long time ago), and it just "didn''t feel right" to me as a coding editor.</p>

      <p>Still, as I said, I haven''t tried it for a while (years!), so it might be worth checking it and see what I like and what I don''t, and hopefully I will be able to come up with that "list" at some point, yet I don''t promise anything since I''m not even sure how much of my feeling comes from the fact that no editor out there "feels like emacs".</p>

      <p>Maybe I''m just a True Emacs Lover and haven''t realized of it yet. Or perhaps I''m just doomed! :)</p>'
    children: []
  - id: 6526
    author: TheGhost
    url: ''
    date: '2013-03-24T23:55:09+00:00'
    date_display: March 24, 2013
    html: <p>I cannot speak for emacs but for me Gedit fails everytime I open large CSV files and try to replace all entries after a given pattern. It starts calculating but never gets finished, in contrast to Kate, which replaces all entries fine in a few seconds.</p>
    children: []
  - id: 6528
    author: liam
    url: ''
    date: '2013-03-25T00:42:51+00:00'
    date_display: March 25, 2013
    html: "<p>It feels slow.\r<br>\nCompare to geany for instance.\r<br>\nLoading large simple text like logs can utterly strangle it.\r<br>\nIt's extensions are awesome however.</p>"
    children: []
