- id: 82
  author: Adrian Perez
  url: https://blogs.igalia.com/aperez/
  date: '2009-09-01T12:15:24+00:00'
  date_display: September 1, 2009
  html: <p>I tried to follow the colours of that old game, Frogger. If you take a look to a screenshot (like <a href="http://yourseosucks.com/files/2009/02/atari-frogger-1984-arcade-game-screenshot.jpg" rel="nofollow">this one</a>) you will notice that the eyes look magenta/purplish. That was the closest colour I have found in the Tango palette, because I tried to follow the Tango conventions. I could make a version with red eyes (of course there are red shades in the palette), but I think that it is a nice tribute to the game :-D</p>
  children: []
