- id: 74
  author: mario
  url: https://mariospr.org
  date: '2009-03-16T15:01:14+00:00'
  date_display: March 16, 2009
  html: "<p>I'm so sorry to tell you, sHs, that no solution tried so far seemed to finally have got rid of the problem completely, as it seems it's something related to the nvidia driver and compiz, not easy to fix though.</p>\n<p>So, giving up using compiz will fix it but, if you don't want to do it so, the only thing  you can do is a combination of these tips and trying to use the latest \"good\" driver from nvidia, which so far are versions 173 and 177 (version 180 does not fall into the \"good ones\" as it get's more trouble even than the glitches).</p>\n<p>Another thing that also \"helps-but-don't-completely-fix\" is to manually manipulate the /usr/bin/compiz shell script to use what they called 'indirect rendering'. That is, to change the line:</p>\n<p># No indirect by default<br>\n  INDIRECT=\"no\"</p>\n<p>... into:</p>\n<p># No indirect by default<br>\n  INDIRECT=\"yes\"</p>\n<p>... in /usr/bin/compiz.</p>\n<p>Hope this helps you somehow while we don't find the definitive solution :P</p>"
  children: []
- id: 75
  author: marleo
  url: ''
  date: '2009-10-06T03:32:54+00:00'
  date_display: October 6, 2009
  html: <p>I've only noticed this problem in Firefox (and gecko-based browsers) so far. Going to about:config, changing mousewheel.withnokey.sysnumlines to false and changing mousewheel.withnokey.numlines to a value of 10 or more seems to fix it. Looks like, if enough of the screen changes, it will redraw it properly.</p>
  children: []
