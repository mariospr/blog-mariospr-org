- id: 11032
  author: Josh Triplett
  url: https://joshtriplett.org/
  date: '2013-11-14T02:05:29+00:00'
  date_display: November 14, 2013
  html: '<p>You can actually specify paths directly as paths, separated from the commit ID with a colon, rather than looking up tree IDs for them within a commit:</p>

    <p>git grep search-string commit-or-tag:path/to/subdirectory</p>'
  children:
  - id: 11043
    author: mario
    url: ''
    date: '2013-11-14T12:11:29+00:00'
    date_display: November 14, 2013
    html: '<p>Cool. I did know of the commit-id:/path/to/file syntax (which I use quite a lot with git show) but I didn''t realize I could use it for this thing as well.</p>

      <p>Thanks for sharing!</p>'
    children: []
